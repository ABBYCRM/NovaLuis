name: Repository Verification

on:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Wait for merged Render deployment and verify live E2E
        run: |
          set -euo pipefail
          primary='https://nova-luis.onrender.com'
          fallback='https://nova-sszi.onrender.com'
          selected=''
          mkdir -p /tmp/live-e2e

          for attempt in $(seq 1 120); do
            for base in "$primary" "$fallback"; do
              health="$(curl -L --connect-timeout 10 --max-time 30 --silent --show-error -o /tmp/live-e2e/health.json -w '%{http_code}' "$base/api/healthz" || true)"
              openclaw="$(curl -L --connect-timeout 10 --max-time 30 --silent --show-error -o /tmp/live-e2e/openclaw.json -w '%{http_code}' "$base/api/openclaw/status" || true)"
              preflight_probe="$(curl -L --connect-timeout 10 --max-time 30 --silent --show-error -o /tmp/live-e2e/preflight-probe.json -w '%{http_code}' \
                -H 'Content-Type: application/json' \
                -d '{"text":"https://github.com/ABBYCRM/NovaLuis.git"}' \
                "$base/api/github/preflight" || true)"
              if [ "$health" = '200' ] && [ "$openclaw" = '200' ] && [ "$preflight_probe" = '401' ] \
                && grep -q '"status":"ok"' /tmp/live-e2e/health.json \
                && grep -q '"status":"ready"' /tmp/live-e2e/openclaw.json; then
                selected="$base"
                break 2
              fi
            done
            sleep 5
          done

          if [ -z "$selected" ]; then
            echo 'Merged GitHub E2E revision did not become live in time.' >&2
            exit 1
          fi

          curl --fail --silent --cookie-jar /tmp/live-e2e/cookie.txt \
            -H 'Content-Type: application/json' \
            -d '{"pin":"22"}' \
            "$selected/api/work-tree/unlock" >/tmp/live-e2e/unlock.json
          grep -q '"ok":true' /tmp/live-e2e/unlock.json

          curl --fail --silent --cookie /tmp/live-e2e/cookie.txt \
            -H 'Content-Type: application/json' \
            -d '{"text":"https://github.com/ABBYCRM/NovaLuis.git tell me what this is and what is in this repo"}' \
            "$selected/api/github/preflight" >/tmp/live-e2e/github-preflight.json
          grep -q '"ok":true' /tmp/live-e2e/github-preflight.json
          grep -q 'ABBYCRM/NovaLuis' /tmp/live-e2e/github-preflight.json
          grep -q '"recentCommits"' /tmp/live-e2e/github-preflight.json
          grep -q 'package.json' /tmp/live-e2e/github-preflight.json

          chat_code="$(curl -L --connect-timeout 10 --max-time 240 --silent --show-error \
            -o /tmp/live-e2e/chat.json -w '%{http_code}' \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json' \
            -d '{"model":"gpt-4o","stream":false,"messages":[{"role":"user","content":"https://github.com/ABBYCRM/NovaLuis.git Tell me what this is and what is in this repo. Use the repository evidence. Mention package.json and recent commits. Do not give a generic capability disclaimer."}]}' \
            "$selected/api/v1/chat/completions")"
          test "$chat_code" = '200'

          python - <<'PY'
          import json, pathlib, re, sys
          p = pathlib.Path('/tmp/live-e2e/chat.json')
          data = json.loads(p.read_text())
          content = data.get('choices', [{}])[0].get('message', {}).get('content', '')
          pathlib.Path('/tmp/live-e2e/chat-content.txt').write_text(content)
          low = content.lower()
          denied = [
              'i currently lack the capability',
              'i cannot access github',
              "i can't access github",
              'unable to access github',
              "don't have direct access to github",
              'do not have direct access to github',
          ]
          if any(x in low for x in denied):
              raise SystemExit('live NOVA still returned a GitHub capability denial')
          required = ['novaluis', 'package.json']
          missing = [x for x in required if x not in low]
          if missing:
              raise SystemExit(f'live chat missing expected grounded repo details: {missing}')
          if len(content.strip()) < 180:
              raise SystemExit('live chat response too short to count as repository analysis')
          print(content[:3000])
          PY

          {
            echo "result=pass"
            echo "selected_url=$selected"
            echo "health_http=200"
            echo "openclaw_http=200"
            echo "protected_preflight=pass"
            echo "legacy_chat_reroute=pass"
            echo "checked_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } | tee /tmp/live-e2e/evidence.txt

      - name: Upload live E2E evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-github-chat-e2e
          path: /tmp/live-e2e
          if-no-files-found: warn
          retention-days: 2
