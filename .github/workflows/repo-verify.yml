name: Repository Verification

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: repo-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Activate pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.32.1 --activate
          pnpm --version

      - name: Validate JSON files
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const ignored = new Set(['node_modules', '.git', 'dist']);
          const failures = [];
          function walk(dir) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              if (ignored.has(entry.name)) continue;
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                walk(full);
                continue;
              }
              if (!entry.name.endsWith('.json')) continue;
              try {
                JSON.parse(fs.readFileSync(full, 'utf8'));
              } catch (error) {
                failures.push(`${full}: ${error instanceof Error ? error.message : String(error)}`);
              }
            }
          }
          walk('.');
          if (failures.length) {
            console.error(`Invalid JSON files (${failures.length}):`);
            for (const failure of failures) console.error(`- ${failure}`);
            process.exit(1);
          }
          NODE

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --shamefully-hoist

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build API
        run: pnpm run build:api

      - name: Validate Python syntax
        run: python -m compileall -q .

      - name: Build production image
        run: docker build --tag nova-luis:verify .
