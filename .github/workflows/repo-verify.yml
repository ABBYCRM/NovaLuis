name: Live Cross-Replica Session Acceptance

on:
  pull_request:

permissions:
  contents: read

jobs:
  verify-live:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      EXPECTED_MAIN_SHA: ${{ github.event.pull_request.base.sha }}
    steps:
      - name: Wait for exact deployed revision
        run: |
          set -euo pipefail
          mkdir -p /tmp/live-session-proof
          primary='https://nova-luis.onrender.com'
          fallback='https://nova-sszi.onrender.com'
          selected=''

          for attempt in $(seq 1 180); do
            for base in "$primary" "$fallback"; do
              code="$(curl -L --connect-timeout 10 --max-time 30 --silent --show-error \
                -o /tmp/live-session-proof/version.json -w '%{http_code}' "$base/api/version" || true)"
              if [ "$code" = '200' ] \
                && jq -e --arg expected "$EXPECTED_MAIN_SHA" '.commit == $expected and .render == true' /tmp/live-session-proof/version.json >/dev/null 2>&1; then
                selected="$base"
                break 2
              fi
            done
            sleep 5
          done

          if [ -z "$selected" ]; then
            echo "Render never reported expected commit $EXPECTED_MAIN_SHA" >&2
            cat /tmp/live-session-proof/version.json >&2 2>/dev/null || true
            exit 1
          fi
          echo "$selected" > /tmp/live-session-proof/selected-url.txt

      - name: Verify live PIN cookie survives the next protected request
        run: |
          set -euo pipefail
          selected="$(cat /tmp/live-session-proof/selected-url.txt)"

          curl --fail --silent "$selected/api/healthz" >/tmp/live-session-proof/health.json
          curl --fail --silent "$selected/api/openclaw/status" >/tmp/live-session-proof/openclaw.json
          grep -q '"status":"ok"' /tmp/live-session-proof/health.json
          grep -q '"status":"ready"' /tmp/live-session-proof/openclaw.json

          pin_code="$(curl --silent --show-error \
            --output /tmp/live-session-proof/unlock.json \
            --write-out '%{http_code}' \
            --cookie-jar /tmp/live-session-proof/cookie.txt \
            -H 'Content-Type: application/json' \
            -d '{"pin":"22"}' \
            "$selected/api/work-tree/unlock")"
          echo "$pin_code" > /tmp/live-session-proof/unlock-http.txt
          test "$pin_code" = '200'
          grep -q '"ok":true' /tmp/live-session-proof/unlock.json

          protected_code="$(curl --silent --show-error \
            --output /tmp/live-session-proof/composio-status.json \
            --write-out '%{http_code}' \
            --cookie /tmp/live-session-proof/cookie.txt \
            "$selected/api/integrations/composio/status")"
          echo "$protected_code" > /tmp/live-session-proof/protected-http.txt
          test "$protected_code" = '200'

          configured="$(jq -r '.configured // false' /tmp/live-session-proof/composio-status.json)"
          ready="$(jq -r '.ready // false' /tmp/live-session-proof/composio-status.json)"
          state="$(jq -r '.credentialState // "unknown"' /tmp/live-session-proof/composio-status.json)"
          source="$(jq -r '.credentialSource // "unknown"' /tmp/live-session-proof/composio-status.json)"

          {
            echo 'result=pass'
            echo "selected_url=$selected"
            echo "expected_main_sha=$EXPECTED_MAIN_SHA"
            echo "live_commit=$(jq -r '.commit' /tmp/live-session-proof/version.json)"
            echo 'health=pass'
            echo 'openclaw=ready'
            echo 'pin_22=pass'
            echo 'protected_cookie_request=pass'
            echo "composio_configured=$configured"
            echo "composio_ready=$ready"
            echo "composio_state=$state"
            echo "composio_source=$source"
            echo "checked_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } | tee /tmp/live-session-proof/evidence.txt

      - name: Upload live session evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-cross-replica-session-proof
          path: /tmp/live-session-proof
          if-no-files-found: warn
          retention-days: 2
