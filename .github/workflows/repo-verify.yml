name: Live Render Revision and PIN Acceptance

on:
  pull_request:

permissions:
  contents: read

jobs:
  verify-live:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      EXPECTED_MAIN_SHA: ${{ github.event.pull_request.base.sha }}
    steps:
      - name: Verify exact Render revision and capture PIN response
        run: |
          set -euo pipefail
          mkdir -p /tmp/live-render-proof
          primary='https://nova-luis.onrender.com'
          fallback='https://nova-sszi.onrender.com'
          selected=''

          for attempt in $(seq 1 60); do
            for base in "$primary" "$fallback"; do
              version_code="$(curl -L --connect-timeout 10 --max-time 30 --silent --show-error \
                -o /tmp/live-render-proof/version.json -w '%{http_code}' "$base/api/version" || true)"
              if [ "$version_code" = '200' ] \
                && jq -e --arg expected "$EXPECTED_MAIN_SHA" '.commit == $expected and .render == true' /tmp/live-render-proof/version.json >/dev/null 2>&1; then
                selected="$base"
                break 2
              fi
            done
            sleep 5
          done
          test -n "$selected"

          curl --fail --silent "$selected/api/healthz" >/tmp/live-render-proof/health.json
          curl --fail --silent "$selected/api/openclaw/status" >/tmp/live-render-proof/openclaw.json

          pin_code="$(curl --silent --show-error \
            --output /tmp/live-render-proof/unlock.json \
            --write-out '%{http_code}' \
            --cookie-jar /tmp/live-render-proof/cookie.txt \
            -H 'Content-Type: application/json' \
            -d '{"pin":"22"}' \
            "$selected/api/work-tree/unlock")"
          echo "$pin_code" > /tmp/live-render-proof/unlock-http.txt

          {
            echo "selected_url=$selected"
            echo "expected_main_sha=$EXPECTED_MAIN_SHA"
            echo "live_commit=$(jq -r '.commit' /tmp/live-render-proof/version.json)"
            echo "pin_http=$pin_code"
            echo "pin_body=$(tr -d '\n' < /tmp/live-render-proof/unlock.json)"
            echo "checked_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } | tee /tmp/live-render-proof/evidence.txt

          if [ "$pin_code" != '200' ]; then
            echo "PIN 22 live failure: HTTP $pin_code" >&2
            cat /tmp/live-render-proof/unlock.json >&2
            exit 1
          fi
          grep -q '"ok":true' /tmp/live-render-proof/unlock.json

      - name: Upload live Render acceptance evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-render-revision-pin-proof
          path: /tmp/live-render-proof
          if-no-files-found: warn
          retention-days: 2
