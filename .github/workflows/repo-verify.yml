name: Live Composio Organization Credential Acceptance

on:
  pull_request:

permissions:
  contents: read

jobs:
  verify-live:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      EXPECTED_MAIN_SHA: ${{ github.event.pull_request.base.sha }}
    steps:
      - name: Wait for exact deployed revision
        run: |
          set -euo pipefail
          mkdir -p /tmp/live-composio-proof
          primary='https://nova-luis.onrender.com'
          fallback='https://nova-sszi.onrender.com'
          selected=''

          for attempt in $(seq 1 180); do
            for base in "$primary" "$fallback"; do
              code="$(curl -L --connect-timeout 10 --max-time 30 --silent --show-error \
                -o /tmp/live-composio-proof/version.json -w '%{http_code}' "$base/api/version" || true)"
              if [ "$code" = '200' ] \
                && jq -e --arg expected "$EXPECTED_MAIN_SHA" '.commit == $expected and .render == true' /tmp/live-composio-proof/version.json >/dev/null 2>&1; then
                selected="$base"
                break 2
              fi
            done
            sleep 5
          done

          if [ -z "$selected" ]; then
            echo "Render never reported expected commit $EXPECTED_MAIN_SHA" >&2
            cat /tmp/live-composio-proof/version.json >&2 2>/dev/null || true
            exit 1
          fi
          echo "$selected" > /tmp/live-composio-proof/selected-url.txt

      - name: Verify live auth and Composio credential state
        run: |
          set -euo pipefail
          selected="$(cat /tmp/live-composio-proof/selected-url.txt)"

          curl --fail --silent "$selected/api/healthz" >/tmp/live-composio-proof/health.json
          curl --fail --silent "$selected/api/openclaw/status" >/tmp/live-composio-proof/openclaw.json
          grep -q '"status":"ok"' /tmp/live-composio-proof/health.json
          grep -q '"status":"ready"' /tmp/live-composio-proof/openclaw.json

          pin_code="$(curl --silent --show-error \
            --output /tmp/live-composio-proof/unlock.json \
            --write-out '%{http_code}' \
            --cookie-jar /tmp/live-composio-proof/cookie.txt \
            -H 'Content-Type: application/json' \
            -d '{"pin":"22"}' \
            "$selected/api/work-tree/unlock")"
          test "$pin_code" = '200'
          grep -q '"ok":true' /tmp/live-composio-proof/unlock.json

          composio_code="$(curl --silent --show-error \
            --output /tmp/live-composio-proof/composio-status.json \
            --write-out '%{http_code}' \
            --cookie /tmp/live-composio-proof/cookie.txt \
            "$selected/api/integrations/composio/status")"
          echo "$composio_code" > /tmp/live-composio-proof/composio-http.txt
          test "$composio_code" = '200'

          jq . /tmp/live-composio-proof/composio-status.json
          configured="$(jq -r '.configured' /tmp/live-composio-proof/composio-status.json)"
          ready="$(jq -r '.ready' /tmp/live-composio-proof/composio-status.json)"
          state="$(jq -r '.credentialState // "unknown"' /tmp/live-composio-proof/composio-status.json)"
          source="$(jq -r '.credentialSource // "unknown"' /tmp/live-composio-proof/composio-status.json)"
          upstream="$(jq -r '.upstreamStatus // "none"' /tmp/live-composio-proof/composio-status.json)"
          error="$(jq -r '.error // ""' /tmp/live-composio-proof/composio-status.json)"

          {
            echo "selected_url=$selected"
            echo "expected_main_sha=$EXPECTED_MAIN_SHA"
            echo "live_commit=$(jq -r '.commit' /tmp/live-composio-proof/version.json)"
            echo "configured=$configured"
            echo "ready=$ready"
            echo "credential_state=$state"
            echo "credential_source=$source"
            echo "upstream_status=$upstream"
            echo "error=$error"
            echo "checked_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } | tee /tmp/live-composio-proof/evidence.txt

          # Exact previous failure was a project-key 401/502 path. It must be gone.
          if [ "$state" = 'invalid' ] && [ "$upstream" = '401' ]; then
            echo 'Live Composio is still on the invalid-project-key path.' >&2
            exit 1
          fi

          # Ideal end state is ready through the organization credential path.
          if [ "$ready" != 'true' ]; then
            echo "Composio credential resolved past the old 401 path but is not ready: state=$state source=$source error=$error" >&2
            exit 1
          fi
          test "$source" = 'organization' -o "$source" = 'project'

      - name: Upload live Composio evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-composio-org-key-proof
          path: /tmp/live-composio-proof
          if-no-files-found: warn
          retention-days: 2
