name: Repository Verification

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: repo-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out exact source revision
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CHECKOUT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          git init --quiet
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          auth_header="$(printf 'x-access-token:%s' "${GITHUB_TOKEN}" | base64 -w0)"
          git -c http.https://github.com/.extraheader="AUTHORIZATION: basic ${auth_header}" fetch --quiet --depth=1 origin "${CHECKOUT_SHA}"
          git checkout --quiet FETCH_HEAD
          test "$(git rev-parse HEAD)" = "${CHECKOUT_SHA}"

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Activate pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.32.1 --activate
          pnpm --version

      - name: Validate JSON files
        run: |
          set +e
          node - <<'NODE' > /tmp/json-validation.txt 2>&1
          const fs = require('node:fs');
          const path = require('node:path');
          const ignored = new Set(['node_modules', '.git', 'dist']);
          const failures = [];
          function walk(dir) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              if (ignored.has(entry.name)) continue;
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                walk(full);
                continue;
              }
              if (!entry.name.endsWith('.json')) continue;
              try {
                JSON.parse(fs.readFileSync(full, 'utf8'));
              } catch (error) {
                failures.push(`${full}: ${error instanceof Error ? error.message : String(error)}`);
              }
            }
          }
          walk('.');
          if (failures.length) {
            console.error(`Invalid JSON files (${failures.length}):`);
            for (const failure of failures) console.error(`- ${failure}`);
            process.exit(1);
          }
          console.log('All JSON files parsed successfully.');
          NODE
          status=$?
          set -e
          cat /tmp/json-validation.txt
          exit "$status"

      - name: Upload JSON diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: json-validation-diagnostics
          path: /tmp/json-validation.txt
          if-no-files-found: ignore
          retention-days: 1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --shamefully-hoist

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build API
        run: pnpm run build:api

      - name: Validate Python syntax
        run: python -m compileall -q .

      - name: Build production image
        run: docker build --tag nova-luis:verify .
