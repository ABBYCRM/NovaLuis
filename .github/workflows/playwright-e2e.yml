##############################################################################
# Playwright E2E — NovaLuis
##############################################################################
name: Playwright E2E

on:
  push:
    branches:
      - main
      - "[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read
  statuses: write

concurrency:
  group: playwright-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      NODE_ENV: test
      PORT: 5000
      API_E2E_BASE_URL: "http://localhost:5000"
      COMPOSIO_API_KEY: ""
      SESSION_SECRET: "ci-operator-session-secret"
      NOVA_WORK_TREE_PIN: "22"
      NOVA_API_TOKEN: "ci-server-api-token"

    steps:
      - uses: actions/checkout@v4

      - name: Mark browser verification pending
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -u -o pipefail
          TARGET_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          PAYLOAD="$(node -e 'process.stdout.write(JSON.stringify({state:"pending",context:"playwright/e2e",description:"Regression, mobile UI, PWA, voice, durable-runtime, and skill verification is running",target_url:process.argv[1]}))' "$TARGET_URL")"
          if ! curl --fail-with-body --silent --show-error \
            --retry 5 --retry-all-errors --retry-delay 2 \
            --request POST \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --header "Content-Type: application/json" \
            --data "$PAYLOAD"; then
            echo "::warning::Could not post pending playwright/e2e commit status after retries. Verification will continue."
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0

      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.26.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --shamefully-hoist

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build API server
        run: pnpm run build:api

      - name: Start API server (background)
        run: |
          node --enable-source-maps ./artifacts/api-server/dist/index.mjs &
          echo $! > /tmp/api-server.pid
          for i in $(seq 1 20); do
            curl -sf http://localhost:5000/healthz && break
            echo "Waiting for API server... ($i/20)"
            sleep 1
          done

      - name: Run API E2E tests
        run: pnpm --filter @workspace/nova exec vitest run test/api-e2e.test.ts --reporter=verbose

      - name: Locate hosted Chromium
        shell: bash
        run: |
          CHROME="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || command -v chromium-browser || true)"
          if [ -z "$CHROME" ]; then
            echo "No hosted Chromium executable found; browser proof may not be skipped." >&2
            exit 1
          fi
          echo "REPLIT_PLAYWRIGHT_CHROMIUM_EXECUTABLE=$CHROME" >> "$GITHUB_ENV"
          "$CHROME" --version

      - name: Run Nova regression, browser runtime, and skill tests
        shell: bash
        run: |
          mkdir -p artifacts/nova/test-results/ui-preservation
          set -o pipefail
          pnpm --filter @workspace/nova exec vitest run \
            test/chat-ui-smoke.test.ts \
            test/ui-preservation.test.ts \
            test/operator-session.test.ts \
            test/runtime-durability-contract.test.ts \
            test/pwa-offline-contract.test.ts \
            test/runtime-durability-browser.test.ts \
            test/regression-recovery-browser.test.ts \
            test/skills-system.test.ts \
            --reporter=verbose \
            2>&1 | tee artifacts/nova/test-results/ui-preservation/vitest.log

      - name: Upload mobile UI proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nova-mobile-ui-proof
          path: artifacts/nova/test-results/ui-preservation/
          if-no-files-found: error
          retention-days: 14

      - name: Stop API server
        if: always()
        run: kill $(cat /tmp/api-server.pid) 2>/dev/null || true

      - name: Mark browser verification success
        if: success() && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -u -o pipefail
          TARGET_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          PAYLOAD="$(node -e 'process.stdout.write(JSON.stringify({state:"success",context:"playwright/e2e",description:"Regression, workspace auth, thinking cube, mobile UI, voice, durable-run, PWA, and skill checks passed",target_url:process.argv[1]}))' "$TARGET_URL")"
          if ! curl --fail-with-body --silent --show-error \
            --retry 5 --retry-all-errors --retry-delay 2 \
            --request POST \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --header "Content-Type: application/json" \
            --data "$PAYLOAD"; then
            echo "::warning::All browser tests passed, but the success commit status could not be posted after retries."
          fi

      - name: Mark browser verification failure
        if: failure() && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -u -o pipefail
          TARGET_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          PAYLOAD="$(node -e 'process.stdout.write(JSON.stringify({state:"failure",context:"playwright/e2e",description:"Regression, workspace auth, mobile UI, durable-runtime, PWA, or skill verification failed",target_url:process.argv[1]}))' "$TARGET_URL")"
          if ! curl --fail-with-body --silent --show-error \
            --retry 5 --retry-all-errors --retry-delay 2 \
            --request POST \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --header "Content-Type: application/json" \
            --data "$PAYLOAD"; then
            echo "::warning::Browser verification failed and the failure commit status could not be posted after retries."
          fi
