name: Operator PIN Compatibility CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: operator-pin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.26.1 --activate
      - name: Install and build
        run: |
          pnpm install --frozen-lockfile --shamefully-hoist
          pnpm run typecheck
          pnpm run build:api
          docker build --tag nova-api-auth:ci .
      - name: Prove current API-token boundary across independent replicas
        run: |
          set -euo pipefail
          # The legacy /api/work-tree/unlock PIN-cookie surface was removed from
          # the runtime. User-data workspace/media routes now use the explicit,
          # replica-stable NOVA_API_TOKEN contract. Keep the historical workflow
          # name so required-check configuration remains compatible, but verify
          # the active security boundary instead of a deleted endpoint.
          for spec in 'nova-auth-a:18081' 'nova-auth-b:18083'; do
            name="${spec%%:*}"
            port="${spec##*:}"
            docker run --detach --name "$name" \
              -e NOVA_API_TOKEN=ci-shared-api-token \
              -e SUPERNOVA_API_KEY=ci-shared-server-secret \
              -e RENDER=true \
              -e RENDER_GIT_COMMIT=ci-render-revision \
              -e RENDER_GIT_BRANCH=main \
              -e RENDER_GIT_REPO_SLUG=ABBYCRM/NovaLuis \
              -e RENDER_SERVICE_ID=srv-ci \
              -e RENDER_SERVICE_NAME=nova-luis \
              -p "${port}:8080" nova-api-auth:ci
          done
          cleanup() {
            docker logs nova-auth-a || true
            docker logs nova-auth-b || true
            docker rm --force nova-auth-a nova-auth-b || true
          }
          trap cleanup EXIT

          for port in 18081 18083; do
            for attempt in $(seq 1 120); do
              if curl --fail --silent "http://127.0.0.1:${port}/api/healthz" >/tmp/health-${port}.json; then break; fi
              sleep 1
            done
          done

          curl --fail --silent http://127.0.0.1:18081/api/version >/tmp/version.json
          grep -q '"commit":"ci-render-revision"' /tmp/version.json
          grep -q '"branch":"main"' /tmp/version.json
          grep -q '"repository":"ABBYCRM/NovaLuis"' /tmp/version.json
          grep -q '"render":true' /tmp/version.json

          # Missing and incorrect credentials fail before database access.
          missing_code="$(curl --silent --output /tmp/missing.json --write-out '%{http_code}' \
            http://127.0.0.1:18081/api/workspaces)"
          test "$missing_code" = '401'
          grep -q 'invalid or missing API token' /tmp/missing.json

          wrong_code="$(curl --silent --output /tmp/wrong.json --write-out '%{http_code}' \
            -H 'Authorization: Bearer definitely-wrong' \
            http://127.0.0.1:18081/api/workspaces)"
          test "$wrong_code" = '401'
          grep -q 'invalid or missing API token' /tmp/wrong.json

          # The same configured token must pass the auth layer on both replicas.
          # No test database is configured, so the next expected boundary is the
          # route's explicit 503 database guard — evidence that auth succeeded.
          bearer_code="$(curl --silent --output /tmp/bearer.json --write-out '%{http_code}' \
            -H 'Authorization: Bearer ci-shared-api-token' \
            http://127.0.0.1:18081/api/workspaces)"
          test "$bearer_code" = '503'
          grep -q 'database not configured' /tmp/bearer.json

          header_code="$(curl --silent --output /tmp/header.json --write-out '%{http_code}' \
            -H 'x-nova-token: ci-shared-api-token' \
            http://127.0.0.1:18083/api/workspaces)"
          test "$header_code" = '503'
          grep -q 'database not configured' /tmp/header.json

          # The retired PIN endpoint must not silently reappear or mint cookies.
          legacy_code="$(curl --silent --output /tmp/legacy.json --write-out '%{http_code}' \
            -H 'Content-Type: application/json' -d '{"pin":"22"}' \
            http://127.0.0.1:18081/api/work-tree/unlock)"
          test "$legacy_code" = '404'
