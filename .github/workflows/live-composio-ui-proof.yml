name: Live Composio UI Proof

on:
  push:
    branches:
      - 2026-07-13/composio-settings-tools
    paths-ignore:
      - LIVE_COMPOSIO_UI_PROOF.json
      - .github/evidence/composio-ui-desktop.png
      - .github/evidence/composio-ui-mobile.png
  pull_request:

permissions:
  contents: write

jobs:
  prove-ui:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out proof branch
        uses: actions/checkout@v4
        with:
          ref: 2026-07-13/composio-settings-tools
          fetch-depth: 1

      - name: Install Playwright outside workspace
        run: |
          mkdir -p /tmp/nova-ui-proof
          cd /tmp/nova-ui-proof
          npm init -y >/dev/null
          npm install playwright@1.55.0 --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: Exercise live Settings UI
        run: |
          cat > /tmp/nova-ui-proof/proof.mjs <<'NODE'
          import { chromium } from 'playwright';
          import fs from 'node:fs';

          const base = 'https://nova-luis.onrender.com';
          const browser = await chromium.launch({ headless: true });
          const evidence = {
            result: 'fail',
            baseUrl: base,
            checkedAt: new Date().toISOString(),
            desktop: {},
            mobile: {},
          };

          async function verify(viewport, screenshotPath, key) {
            const page = await browser.newPage({ viewport });
            page.on('dialog', async (dialog) => {
              await dialog.dismiss();
            });
            await page.goto(base, { waitUntil: 'domcontentloaded', timeout: 120000 });
            await page.waitForSelector('#settings-btn', { state: 'visible', timeout: 30000 });
            await page.click('#settings-btn');
            await page.waitForSelector('#settings-modal', { state: 'visible', timeout: 30000 });
            await page.waitForSelector('#composio-settings', { state: 'visible', timeout: 30000 });
            await page.waitForSelector('#cmp-picker', { state: 'visible', timeout: 30000 });

            const title = await page.locator('#composio-settings').getByText('Composio Apps', { exact: true }).count();
            const summary = await page.locator('#cmp-picker summary').getByText('Connect an app', { exact: true }).count();
            const chips = {};
            for (const name of ['GitHub', 'Gmail', 'Slack', 'Notion']) {
              chips[name] = await page.locator('#cmp-featured').getByRole('button', { name, exact: true }).count();
            }

            await page.locator('#cmp-featured').getByRole('button', { name: 'GitHub', exact: true }).click();
            await page.waitForSelector('[data-cmp-app="github"]', { state: 'visible', timeout: 15000 });
            const githubButton = await page.locator('[data-cmp-app="github"] [data-cmp-connect="github"]').count();

            const layout = await page.evaluate(() => {
              const modal = document.querySelector('#settings-modal');
              const panel = document.querySelector('#composio-settings');
              const picker = document.querySelector('#cmp-picker');
              if (!modal || !panel || !picker) throw new Error('Settings nodes missing');
              const modalRect = modal.getBoundingClientRect();
              const panelRect = panel.getBoundingClientRect();
              return {
                viewportWidth: window.innerWidth,
                modalLeft: modalRect.left,
                modalRight: modalRect.right,
                modalWidth: modalRect.width,
                panelLeft: panelRect.left,
                panelRight: panelRect.right,
                panelWidth: panelRect.width,
                bodyOverflow: document.documentElement.scrollWidth - document.documentElement.clientWidth,
                modalOverflow: modal.scrollWidth - modal.clientWidth,
                pickerOpen: picker.hasAttribute('open'),
              };
            });

            const assertions = {
              title: title === 1,
              summary: summary === 1,
              featured: Object.values(chips).every((count) => count === 1),
              githubResult: githubButton === 1,
              pickerOpen: layout.pickerOpen === true,
              panelInsideViewport: layout.panelLeft >= -1 && layout.panelRight <= layout.viewportWidth + 1,
              noBodyHorizontalOverflow: layout.bodyOverflow <= 2,
              noModalHorizontalOverflow: layout.modalOverflow <= 2,
            };
            if (!Object.values(assertions).every(Boolean)) {
              throw new Error(`${key} assertions failed: ${JSON.stringify({ assertions, chips, layout })}`);
            }

            await page.locator('#settings-modal').screenshot({ path: screenshotPath });
            evidence[key] = { viewport, chips, layout, assertions };
            await page.close();
          }

          try {
            await verify({ width: 1440, height: 1000 }, '/tmp/composio-ui-desktop.png', 'desktop');
            await verify({ width: 390, height: 844 }, '/tmp/composio-ui-mobile.png', 'mobile');
            evidence.result = 'pass';
          } catch (error) {
            evidence.error = error instanceof Error ? error.stack || error.message : String(error);
            throw error;
          } finally {
            fs.writeFileSync('LIVE_COMPOSIO_UI_PROOF.json', JSON.stringify(evidence, null, 2) + '\n');
            await browser.close();
          }
          NODE
          node /tmp/nova-ui-proof/proof.mjs
          mkdir -p .github/evidence
          cp /tmp/composio-ui-desktop.png .github/evidence/composio-ui-desktop.png
          cp /tmp/composio-ui-mobile.png .github/evidence/composio-ui-mobile.png

      - name: Commit visual proof
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add LIVE_COMPOSIO_UI_PROOF.json .github/evidence/composio-ui-desktop.png .github/evidence/composio-ui-mobile.png 2>/dev/null || true
          git commit -m "ci: record Playwright Composio Settings proof" || exit 0
          git push origin HEAD:2026-07-13/composio-settings-tools

      - name: Enforce UI proof
        run: grep -q '"result": "pass"' LIVE_COMPOSIO_UI_PROOF.json
