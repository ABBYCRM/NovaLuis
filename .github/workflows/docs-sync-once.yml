name: Synchronize Composio Repair Notes Once

on:
  push:
    branches:
      - 2026-07-14/composio-org-key-auto-resolve

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 2026-07-14/composio-org-key-auto-resolve
          fetch-depth: 1
      - name: Prepend required repository notes
        run: |
          python - <<'PY'
          from pathlib import Path

          sections = {
              'README.md': '''## Composio credential compatibility\n\nNOVA accepts both Composio **project API keys** and **organization access tokens**. Project keys are sent as `x-api-key`. Organization tokens are sent as `x-org-api-key`, used to select the intended NOVA/production project, and the resolved project key is then used for Tool Router. Previously saved organization tokens in the legacy key field are auto-classified so a valid organization credential is not rejected as an invalid project key. See [`docs/COMPOSIO.md`](docs/COMPOSIO.md).\n\n''',
              'CHANGELOG.md': '''## 2026-07-14 — Resolve Composio organization credentials correctly\n\n- Live PIN/session auth succeeded, but the configured Composio credential was rejected because NOVA sent an organization access token as `x-api-key`.\n- Added project-vs-organization credential classification and `COMPOSIO_ORG_API_KEY` support.\n- Organization credentials now use `x-org-api-key` to discover/select a project and retrieve its project API key; only the resolved project key reaches Tool Router as `x-api-key`.\n- Distinct stored/environment credentials are tried independently so one stale credential cannot mask a valid fallback.\n- Composio status now reports recoverable credential state/source instead of converting credential failures into a generic application outage.\n- Dedicated production-container CI proves `oak_ci_org` is used as an organization credential and `ak_ci_project` as the resolved Tool Router project credential.\n\n''',
              'AI_NOTES.md': '''## 2026-07-14 — Composio organization-token auto-resolution\n\n- **Observed live failure:** after PIN/session auth succeeded, Composio returned HTTP 401 because the live organization access token was sent as a project API key.\n- **Official contract:** project API keys use `x-api-key`; organization access tokens use `x-org-api-key` and manage projects.\n- **Repair:** classify both credential types, preserve old Settings input compatibility, resolve the intended project with the organization API, retrieve its project key, and use only that project key for Tool Router.\n- **Fallback:** environment and stored credentials are distinct candidates, preventing one stale key from masking another valid key.\n- **Proof:** dedicated CI observes `x-org-api-key=oak_ci_org`, then `x-api-key=ak_ci_project`, and requires `credentialSource=organization` plus the selected project ID.\n- **Live truth gate:** exact Render revision must match `main`, PIN `22` must succeed, and protected Composio status must leave the previous invalid-project-key path.\n\n''',
          }

          for name, section in sections.items():
              path = Path(name)
              text = path.read_text()
              marker = section.splitlines()[0]
              if marker in text:
                  continue
              if name == 'README.md':
                  anchor = '\n## Runtime topology\n'
                  if anchor not in text:
                      raise SystemExit('README anchor missing')
                  text = text.replace(anchor, '\n' + section + '## Runtime topology\n', 1)
              else:
                  anchor = '\n---\n'
                  if anchor not in text:
                      raise SystemExit(f'{name} anchor missing')
                  text = text.replace(anchor, '\n---\n\n' + section, 1)
              path.write_text(text)
          PY
          git diff --check
      - name: Commit notes and remove one-time workflow
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/docs-sync-once.yml
          git add README.md CHANGELOG.md AI_NOTES.md
          git diff --cached --check
          git commit -m 'docs: record Composio organization credential repair'
          git push origin HEAD:2026-07-14/composio-org-key-auto-resolve
