name: Live Composio Deployment Probe

on:
  push:
    branches:
      - 2026-07-13/composio-settings-tools
    paths-ignore:
      - LIVE_COMPOSIO_PROBE.txt

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Check out probe branch
        uses: actions/checkout@v4
        with:
          ref: 2026-07-13/composio-settings-tools
          fetch-depth: 1

      - name: Probe live deployment
        run: |
          set -u
          base='https://nova-luis.onrender.com'
          mkdir -p /tmp/composio-probe
          result='fail'
          health_code='000'
          openclaw_code='000'
          asset_code='000'
          index_code='000'
          agent_code='000'

          for attempt in $(seq 1 100); do
            health_code="$(curl -L --connect-timeout 10 --max-time 30 --silent --show-error -o /tmp/composio-probe/health.json -w '%{http_code}' "$base/api/healthz" || true)"
            openclaw_code="$(curl -L --connect-timeout 10 --max-time 30 --silent --show-error -o /tmp/composio-probe/openclaw.json -w '%{http_code}' "$base/api/openclaw/status" || true)"
            asset_code="$(curl -L --connect-timeout 10 --max-time 30 --silent --show-error -o /tmp/composio-probe/composio-settings.js -w '%{http_code}' "$base/assets/composio-settings.js" || true)"
            index_code="$(curl -L --connect-timeout 10 --max-time 30 --silent --show-error -o /tmp/composio-probe/index.html -w '%{http_code}' "$base/" || true)"
            agent_code="$(curl -L --connect-timeout 10 --max-time 30 --silent --show-error -o /tmp/composio-probe/agent.json -w '%{http_code}' -H 'Content-Type: application/json' -d '{}' "$base/api/agent/v1/chat/completions" || true)"

            if [ "$health_code" = '200' ] \
              && [ "$openclaw_code" = '200' ] \
              && [ "$asset_code" = '200' ] \
              && [ "$index_code" = '200' ] \
              && [ "$agent_code" = '400' ] \
              && grep -q '"status":"ok"' /tmp/composio-probe/health.json 2>/dev/null \
              && grep -q '"status":"ready"' /tmp/composio-probe/openclaw.json 2>/dev/null \
              && grep -q 'Connect an app' /tmp/composio-probe/composio-settings.js 2>/dev/null \
              && grep -q '/assets/composio-settings.js' /tmp/composio-probe/index.html 2>/dev/null \
              && grep -q 'messages must be an array' /tmp/composio-probe/agent.json 2>/dev/null; then
              result='pass'
              break
            fi
            sleep 5
          done

          {
            echo "result=$result"
            echo "base_url=$base"
            echo "health_http=$health_code"
            echo "openclaw_http=$openclaw_code"
            echo "composio_asset_http=$asset_code"
            echo "homepage_http=$index_code"
            echo "agent_route_http=$agent_code"
            echo "health_body=$(tr -d '\n' < /tmp/composio-probe/health.json 2>/dev/null || true)"
            echo "openclaw_body=$(tr -d '\n' < /tmp/composio-probe/openclaw.json 2>/dev/null || true)"
            echo "agent_body=$(tr -d '\n' < /tmp/composio-probe/agent.json 2>/dev/null || true)"
            echo "composio_asset_bytes=$(wc -c < /tmp/composio-probe/composio-settings.js 2>/dev/null || echo 0)"
            echo "homepage_bytes=$(wc -c < /tmp/composio-probe/index.html 2>/dev/null || echo 0)"
            echo "checked_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } | tee LIVE_COMPOSIO_PROBE.txt

      - name: Commit probe evidence
        if: always()
        run: |
          if [ ! -f LIVE_COMPOSIO_PROBE.txt ]; then
            printf 'result=fail\nprobe_error=no evidence produced\n' > LIVE_COMPOSIO_PROBE.txt
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add LIVE_COMPOSIO_PROBE.txt
          git commit -m "ci: record live Composio deployment evidence" || exit 0
          git push origin HEAD:2026-07-13/composio-settings-tools

      - name: Enforce live deployment
        run: grep -q '^result=pass$' LIVE_COMPOSIO_PROBE.txt
