name: OpenClaw Backend CI

on:
  push:
  pull_request:

permissions:
  contents: write

concurrency:
  group: openclaw-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out exact source revision
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CHECKOUT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          git init --quiet
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          auth_header="$(printf 'x-access-token:%s' "${GITHUB_TOKEN}" | base64 -w0)"
          git -c http.https://github.com/.extraheader="AUTHORIZATION: basic ${auth_header}" fetch --quiet --depth=1 origin "${CHECKOUT_SHA}"
          git checkout --quiet FETCH_HEAD
          test "$(git rev-parse HEAD)" = "${CHECKOUT_SHA}"

      - name: Apply exact database nullability repair
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
              Path("artifacts/api-server/src/routes/work-tree.ts"): (
                  '''type DbModule = typeof import("@workspace/db");
          let dbModulePromise: Promise<DbModule | null> | null = null;
          async function getDb(): Promise<DbModule | null> {
            if (!process.env.DATABASE_URL) return null;
            if (!dbModulePromise) {
              dbModulePromise = import("@workspace/db").catch(() => null);
            }
            return dbModulePromise;
          }''',
                  '''type DbModule = typeof import("@workspace/db");
          type ReadyDbModule = DbModule & { db: NonNullable<DbModule["db"]> };
          let dbModulePromise: Promise<ReadyDbModule | null> | null = null;
          async function getDb(): Promise<ReadyDbModule | null> {
            if (!process.env.DATABASE_URL) return null;
            if (!dbModulePromise) {
              dbModulePromise = import("@workspace/db")
                .then((mod) => (mod.db ? (mod as ReadyDbModule) : null))
                .catch(() => null);
            }
            return dbModulePromise;
          }''',
              ),
              Path("artifacts/api-server/src/lib/scratchpad.ts"): (
                  '''type DbModule = typeof import("@workspace/db");

          let dbModulePromise: Promise<DbModule | null> | null = null;

          async function getDb(): Promise<DbModule | null> {
            if (!process.env.DATABASE_URL) return null;
            if (!dbModulePromise) {
              dbModulePromise = import("@workspace/db").catch(() => null);
            }
            return dbModulePromise;
          }''',
                  '''type DbModule = typeof import("@workspace/db");
          type ReadyDbModule = DbModule & { db: NonNullable<DbModule["db"]> };

          let dbModulePromise: Promise<ReadyDbModule | null> | null = null;

          async function getDb(): Promise<ReadyDbModule | null> {
            if (!process.env.DATABASE_URL) return null;
            if (!dbModulePromise) {
              dbModulePromise = import("@workspace/db")
                .then((mod) => (mod.db ? (mod as ReadyDbModule) : null))
                .catch(() => null);
            }
            return dbModulePromise;
          }''',
              ),
              Path("artifacts/api-server/src/lib/knowledge.ts"): (
                  '''export async function searchKnowledge(
            query: string,
            limit = 5,
          ): Promise<KnowledgeHit[]> {
            const vec = await embed(query);''',
                  '''export async function searchKnowledge(
            query: string,
            limit = 5,
          ): Promise<KnowledgeHit[]> {
            if (!hasDatabase || !db) return [];
            const vec = await embed(query);''',
              ),
          }

          for path, (old, new) in replacements.items():
              text = path.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected exactly one repair target, found {count}")
              path.write_text(text.replace(old, new, 1))
          PY
          git diff --check
          test "$(git diff --name-only | sort)" = "$(printf '%s\n' \
            artifacts/api-server/src/lib/knowledge.ts \
            artifacts/api-server/src/lib/scratchpad.ts \
            artifacts/api-server/src/routes/work-tree.ts | sort)"

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0

      - name: Activate pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate
          pnpm --version

      - name: Install workspace dependencies
        run: |
          set +e
          pnpm install --frozen-lockfile --shamefully-hoist --reporter=append-only > /tmp/pnpm-install.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            tail -n 80 /tmp/pnpm-install.log >&2
            exit "$status"
          fi
          tail -n 20 /tmp/pnpm-install.log

      - name: Typecheck workspace
        run: |
          set +e
          pnpm run typecheck > /tmp/typecheck.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            grep -E 'error TS[0-9]+|ERR_PNPM_RECURSIVE_RUN_FIRST_FAIL|ELIFECYCLE' /tmp/typecheck.log | tail -n 80 >&2 || true
            exit "$status"
          fi
          tail -n 30 /tmp/typecheck.log

      - name: Upload typecheck diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: /tmp/typecheck.log
          if-no-files-found: ignore
          retention-days: 1

      - name: Build API bundle
        run: pnpm --filter @workspace/api-server run build

      - name: Validate runtime scripts
        run: |
          node --check scripts/start-openclaw.mjs
          node --check openclaw/workspace/skills/nova-services/nova-services.mjs
          node -e 'JSON.parse(require("node:fs").readFileSync("openclaw/openclaw.json", "utf8"))'

      - name: Install and validate pinned OpenClaw
        env:
          OPENCLAW_CONFIG_PATH: ${{ github.workspace }}/openclaw/openclaw.json
          OPENCLAW_GATEWAY_TOKEN: ci-gateway-token-not-secret
          OPENCLAW_WORKSPACE_DIR: ${{ github.workspace }}/openclaw/workspace
          NOVA_INTERNAL_API_BASE: http://127.0.0.1:8080/api
          NOVA_INTERNAL_MODEL_BASE_URL: http://127.0.0.1:8080/api/v1
          NOVA_OPENCLAW_PROXY_KEY: ci-proxy-token-not-secret
          NOVA_OPENCLAW_MODEL_ID: gpt-4o-mini
        run: |
          npm install -g openclaw@2026.6.11 --omit=dev --no-audit --no-fund
          openclaw --version
          openclaw config validate
          openclaw skills check --agent main | tee /tmp/openclaw-skills.txt
          grep -q 'nova-services' /tmp/openclaw-skills.txt

      - name: Build production image
        run: docker build --tag nova-openclaw:ci .

      - name: Smoke-test production container
        run: |
          set -euo pipefail
          docker run --detach --name nova-openclaw-ci -p 18080:8080 nova-openclaw:ci
          cleanup() {
            docker logs nova-openclaw-ci || true
            docker rm --force nova-openclaw-ci || true
          }
          trap cleanup EXIT

          for attempt in $(seq 1 120); do
            if curl --fail --silent http://127.0.0.1:18080/api/healthz >/tmp/nova-health.json \
              && curl --fail --silent http://127.0.0.1:18080/api/openclaw/status >/tmp/openclaw-status.json; then
              break
            fi
            if ! docker inspect --format '{{.State.Running}}' nova-openclaw-ci | grep -q true; then
              echo 'Container exited before becoming ready' >&2
              exit 1
            fi
            sleep 1
          done

          grep -q '"status":"ok"' /tmp/nova-health.json
          grep -q '"status":"ready"' /tmp/openclaw-status.json
          curl --fail --silent http://127.0.0.1:18080/ >/tmp/nova-index.html
          curl --fail --silent http://127.0.0.1:18080/assets/bob.js >/tmp/nova-bob.js
          test -s /tmp/nova-index.html
          test -s /tmp/nova-bob.js

      - name: Commit verified database repair
        if: success() && github.ref == 'refs/heads/agent/embed-openclaw-backend'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            artifacts/api-server/src/lib/knowledge.ts \
            artifacts/api-server/src/lib/scratchpad.ts \
            artifacts/api-server/src/routes/work-tree.ts
          git diff --cached --check
          git commit -m "fix: narrow database module before use"
          auth_header="$(printf 'x-access-token:%s' "${GITHUB_TOKEN}" | base64 -w0)"
          git -c http.https://github.com/.extraheader="AUTHORIZATION: basic ${auth_header}" push origin HEAD:refs/heads/agent/embed-openclaw-backend
