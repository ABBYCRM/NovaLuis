name: OpenClaw Backend CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: openclaw-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out exact source revision
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CHECKOUT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          git init --quiet
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          auth_header="$(printf 'x-access-token:%s' "${GITHUB_TOKEN}" | base64 -w0)"
          git -c http.https://github.com/.extraheader="AUTHORIZATION: basic ${auth_header}" fetch --quiet --depth=1 origin "${CHECKOUT_SHA}"
          git checkout --quiet FETCH_HEAD
          test "$(git rev-parse HEAD)" = "${CHECKOUT_SHA}"

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0

      - name: Activate pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.32.1 --activate
          pnpm --version

      - name: Install workspace dependencies
        run: |
          set +e
          pnpm install --frozen-lockfile --shamefully-hoist --reporter=append-only > /tmp/pnpm-install.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo "pnpm install failed; final diagnostic lines:" >&2
            tail -n 80 /tmp/pnpm-install.log >&2
            exit "$status"
          fi
          tail -n 20 /tmp/pnpm-install.log

      - name: Typecheck workspace
        run: |
          set +e
          pnpm run typecheck > /tmp/typecheck.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo "TypeScript typecheck failed; exact diagnostics:" >&2
            grep -E 'error TS[0-9]+|ERR_PNPM_RECURSIVE_RUN_FIRST_FAIL|ELIFECYCLE' /tmp/typecheck.log | tail -n 100 >&2 || tail -n 60 /tmp/typecheck.log >&2
            exit "$status"
          fi
          tail -n 30 /tmp/typecheck.log

      - name: Upload typecheck diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: /tmp/typecheck.log
          if-no-files-found: ignore
          retention-days: 1

      - name: Build API bundle
        run: pnpm --filter @workspace/api-server run build

      - name: Validate runtime and UI scripts
        run: |
          node --check scripts/start-openclaw.mjs
          node --check openclaw/workspace/skills/nova-services/nova-services.mjs
          node --check artifacts/nova/public/assets/composio-settings.js
          node -e 'JSON.parse(require("node:fs").readFileSync("openclaw/openclaw.json", "utf8"))'
          grep -q '/assets/composio-settings.js' artifacts/nova/index.html
          grep -q 'composio-search' openclaw/workspace/skills/nova-services/SKILL.md
          grep -q '/agent/v1/chat/completions' artifacts/nova/public/assets/composio-settings.js
          grep -q 'getGitHubEvidenceForText' artifacts/api-server/src/routes/agent-chat.ts
          grep -q 'proxyBrowserChatToAgent' artifacts/api-server/src/routes/openai-proxy.ts
          grep -q 'GitHub REST API' artifacts/api-server/src/lib/github-repo.ts

      - name: Install and validate pinned OpenClaw
        env:
          OPENCLAW_CONFIG_PATH: ${{ github.workspace }}/openclaw/openclaw.json
          OPENCLAW_GATEWAY_TOKEN: ci-gateway-token-not-secret
          OPENCLAW_WORKSPACE_DIR: ${{ github.workspace }}/openclaw/workspace
          NOVA_INTERNAL_API_BASE: http://127.0.0.1:8080/api
          NOVA_INTERNAL_MODEL_BASE_URL: http://127.0.0.1:8080/api/v1
          NOVA_OPENCLAW_PROXY_KEY: ci-proxy-token-not-secret
          NOVA_OPENCLAW_MODEL_ID: gpt-4o-mini
        run: |
          npm install -g openclaw@2026.6.11 --omit=dev --no-audit --no-fund
          openclaw --version
          openclaw config validate
          openclaw skills check --agent main | tee /tmp/openclaw-skills.txt
          grep -q 'nova-services' /tmp/openclaw-skills.txt

      - name: Install Playwright Chromium for UI proof
        run: |
          mkdir -p /tmp/nova-ui-proof
          cd /tmp/nova-ui-proof
          npm init -y >/dev/null
          npm install playwright@1.55.0 --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: Build production image
        run: docker build --tag nova-openclaw:ci .

      - name: Smoke-test production container, GitHub preflight, and Settings UI
        run: |
          set -euo pipefail
          docker run --detach --name nova-openclaw-ci \
            -e SESSION_SECRET=ci-session-secret-not-production \
            -e NOVA_WORK_TREE_PIN=22 \
            -p 18080:8080 nova-openclaw:ci
          cleanup() {
            docker logs nova-openclaw-ci || true
            docker rm --force nova-openclaw-ci || true
          }
          trap cleanup EXIT

          for attempt in $(seq 1 120); do
            if curl --fail --silent http://127.0.0.1:18080/api/healthz >/tmp/nova-health.json \
              && curl --fail --silent http://127.0.0.1:18080/api/openclaw/status >/tmp/openclaw-status.json; then
              break
            fi
            if ! docker inspect --format '{{.State.Running}}' nova-openclaw-ci | grep -q true; then
              echo 'Container exited before becoming ready' >&2
              exit 1
            fi
            sleep 1
          done

          grep -q '"status":"ok"' /tmp/nova-health.json
          grep -q '"status":"ready"' /tmp/openclaw-status.json

          curl --fail --silent http://127.0.0.1:18080/ >/tmp/nova-index.html
          curl --fail --silent http://127.0.0.1:18080/assets/bob.js >/tmp/nova-bob.js
          curl --fail --silent http://127.0.0.1:18080/assets/composio-settings.js >/tmp/composio-settings.js
          test -s /tmp/nova-index.html
          test -s /tmp/nova-bob.js
          test -s /tmp/composio-settings.js
          grep -q '/assets/composio-settings.js' /tmp/nova-index.html
          grep -q 'Connect an app' /tmp/composio-settings.js

          agent_code="$(curl --silent --output /tmp/agent-validation.json --write-out '%{http_code}' \
            -H 'Content-Type: application/json' -d '{}' \
            http://127.0.0.1:18080/api/agent/v1/chat/completions)"
          test "$agent_code" = '400'
          grep -q 'messages must be an array' /tmp/agent-validation.json

          curl --fail --silent --cookie-jar /tmp/nova-cookie.txt \
            -H 'Content-Type: application/json' -d '{"pin":"22"}' \
            http://127.0.0.1:18080/api/work-tree/unlock >/tmp/unlock.json
          grep -q '"ok":true' /tmp/unlock.json

          curl --fail --silent --cookie /tmp/nova-cookie.txt \
            http://127.0.0.1:18080/api/integrations/composio/status >/tmp/composio-status.json
          grep -q '"configured":false' /tmp/composio-status.json

          curl --fail --silent --cookie /tmp/nova-cookie.txt \
            -H 'Content-Type: application/json' \
            -d '{"text":"https://github.com/ABBYCRM/NovaLuis.git tell me what is in this repository"}' \
            http://127.0.0.1:18080/api/github/preflight >/tmp/github-preflight.json
          grep -q '"ok":true' /tmp/github-preflight.json
          grep -q 'ABBYCRM/NovaLuis' /tmp/github-preflight.json
          grep -q 'GitHub REST API' /tmp/github-preflight.json
          grep -q 'package.json' /tmp/github-preflight.json
          grep -q 'recentCommits' /tmp/github-preflight.json

          cat > /tmp/nova-ui-proof/proof.mjs <<'NODE'
          import { chromium } from 'playwright';
          import fs from 'node:fs';

          const base = 'http://127.0.0.1:18080';
          const browser = await chromium.launch({ headless: true });
          const evidence = {
            result: 'fail',
            baseUrl: base,
            checkedAt: new Date().toISOString(),
            desktop: {},
            mobile: {},
          };

          async function verify(viewport, screenshotPath, key) {
            const page = await browser.newPage({ viewport });
            page.on('dialog', async (dialog) => dialog.dismiss());
            await page.goto(base, { waitUntil: 'domcontentloaded', timeout: 60000 });
            if (viewport.width <= 1024) {
              await page.locator('#hamburger').click();
              await page.waitForFunction(() => document.querySelector('#sidebar')?.classList.contains('open'));
            }
            await page.locator('#settings-btn').click();
            await page.locator('#settings-modal').waitFor({ state: 'visible' });
            await page.locator('#composio-settings').waitFor({ state: 'visible' });
            await page.locator('#composio-settings').scrollIntoViewIfNeeded();

            const title = await page.locator('#composio-settings').getByText('Composio Apps', { exact: true }).count();
            const summary = await page.locator('#cmp-picker summary').getByText('Connect an app', { exact: true }).count();
            const chips = {};
            for (const name of ['GitHub', 'Gmail', 'Slack', 'Notion']) {
              chips[name] = await page.locator('#cmp-featured').getByRole('button', { name, exact: true }).count();
            }

            await page.locator('#cmp-featured').getByRole('button', { name: 'GitHub', exact: true }).click();
            await page.locator('[data-cmp-app="github"]').waitFor({ state: 'visible', timeout: 15000 });
            const githubButton = await page.locator('[data-cmp-app="github"] [data-cmp-connect="github"]').count();

            const layout = await page.evaluate(() => {
              const modal = document.querySelector('#settings-modal');
              const panel = document.querySelector('#composio-settings');
              const picker = document.querySelector('#cmp-picker');
              if (!modal || !panel || !picker) throw new Error('Settings nodes missing');
              const modalRect = modal.getBoundingClientRect();
              const panelRect = panel.getBoundingClientRect();
              return {
                viewportWidth: window.innerWidth,
                modalLeft: modalRect.left,
                modalRight: modalRect.right,
                modalWidth: modalRect.width,
                panelLeft: panelRect.left,
                panelRight: panelRect.right,
                panelWidth: panelRect.width,
                bodyOverflow: document.documentElement.scrollWidth - document.documentElement.clientWidth,
                modalOverflow: modal.scrollWidth - modal.clientWidth,
                pickerOpen: picker.hasAttribute('open'),
              };
            });

            const assertions = {
              title: title === 1,
              summary: summary === 1,
              featured: Object.values(chips).every((count) => count === 1),
              githubResult: githubButton === 1,
              pickerOpen: layout.pickerOpen === true,
              panelInsideViewport: layout.panelLeft >= -1 && layout.panelRight <= layout.viewportWidth + 1,
              noBodyHorizontalOverflow: layout.bodyOverflow <= 2,
              noModalHorizontalOverflow: layout.modalOverflow <= 2,
            };
            if (!Object.values(assertions).every(Boolean)) {
              throw new Error(`${key} assertions failed: ${JSON.stringify({ assertions, chips, layout })}`);
            }

            await page.locator('#composio-settings').screenshot({ path: screenshotPath });
            evidence[key] = { viewport, chips, layout, assertions };
            await page.close();
          }

          try {
            await verify({ width: 1440, height: 1000 }, '/tmp/composio-ui-desktop.png', 'desktop');
            await verify({ width: 390, height: 844 }, '/tmp/composio-ui-mobile.png', 'mobile');
            evidence.result = 'pass';
          } catch (error) {
            evidence.error = error instanceof Error ? error.stack || error.message : String(error);
            throw error;
          } finally {
            fs.writeFileSync('/tmp/composio-ui-proof.json', JSON.stringify(evidence, null, 2) + '\n');
            await browser.close();
          }
          NODE
          node /tmp/nova-ui-proof/proof.mjs
          grep -q '"result": "pass"' /tmp/composio-ui-proof.json

      - name: Upload Composio UI proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: composio-settings-ui-proof
          path: |
            /tmp/composio-ui-proof.json
            /tmp/composio-ui-desktop.png
            /tmp/composio-ui-mobile.png
            /tmp/github-preflight.json
          if-no-files-found: warn
          retention-days: 7
