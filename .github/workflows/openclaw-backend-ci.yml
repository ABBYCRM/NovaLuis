name: OpenClaw Backend CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: openclaw-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0

      - name: Activate pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate
          pnpm --version

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile --shamefully-hoist

      - name: Typecheck workspace
        run: pnpm run typecheck

      - name: Build API bundle
        run: pnpm --filter @workspace/api-server run build

      - name: Validate runtime scripts
        run: |
          node --check scripts/start-openclaw.mjs
          node --check openclaw/workspace/skills/nova-services/nova-services.mjs
          node -e 'JSON.parse(require("node:fs").readFileSync("openclaw/openclaw.json", "utf8"))'

      - name: Install and validate pinned OpenClaw
        env:
          OPENCLAW_CONFIG_PATH: ${{ github.workspace }}/openclaw/openclaw.json
          OPENCLAW_GATEWAY_TOKEN: ci-gateway-token-not-secret
          OPENCLAW_WORKSPACE_DIR: ${{ github.workspace }}/openclaw/workspace
          NOVA_INTERNAL_API_BASE: http://127.0.0.1:8080/api
          NOVA_INTERNAL_MODEL_BASE_URL: http://127.0.0.1:8080/api/v1
          NOVA_OPENCLAW_PROXY_KEY: ci-proxy-token-not-secret
          NOVA_OPENCLAW_MODEL_ID: gpt-4o-mini
        run: |
          npm install -g openclaw@2026.6.11 --omit=dev --no-audit --no-fund
          openclaw --version
          openclaw config validate
          openclaw skills check --agent main | tee /tmp/openclaw-skills.txt
          grep -q 'nova-services' /tmp/openclaw-skills.txt

      - name: Build production image
        run: docker build --tag nova-openclaw:ci .

      - name: Smoke-test production container
        run: |
          set -euo pipefail
          docker run --detach --name nova-openclaw-ci -p 18080:8080 nova-openclaw:ci
          cleanup() {
            docker logs nova-openclaw-ci || true
            docker rm --force nova-openclaw-ci || true
          }
          trap cleanup EXIT

          for attempt in $(seq 1 120); do
            if curl --fail --silent http://127.0.0.1:18080/api/healthz >/tmp/nova-health.json \
              && curl --fail --silent http://127.0.0.1:18080/api/openclaw/status >/tmp/openclaw-status.json; then
              break
            fi
            if ! docker inspect --format '{{.State.Running}}' nova-openclaw-ci | grep -q true; then
              echo 'Container exited before becoming ready' >&2
              exit 1
            fi
            sleep 1
          done

          grep -q '"status":"ok"' /tmp/nova-health.json
          grep -q '"status":"ready"' /tmp/openclaw-status.json
          curl --fail --silent http://127.0.0.1:18080/ >/tmp/nova-index.html
          curl --fail --silent http://127.0.0.1:18080/assets/bob.js >/tmp/nova-bob.js
          test -s /tmp/nova-index.html
          test -s /tmp/nova-bob.js
