name: Verify Production Runtime

on:
  workflow_run:
    workflows: ["Deploy DigitalOcean"]
    types: [completed]

permissions:
  contents: read
  statuses: write

concurrency:
  group: nova-luis-production-verification
  cancel-in-progress: true

jobs:
  verify:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
      LIVE_URL: https://nova-luis-8hjvt.ondigitalocean.app
      DO_APP_ID: a1046ca0-ab98-4775-8ed7-24f156432aaf
      DIGITALOCEAN_API_TOKEN: ${{ secrets.DIGITALOCEAN_API_TOKEN }}
      DIGITALOCEAN_API_TOKEN_PAID: ${{ secrets.DIGITALOCEAN_API_TOKEN_PAID }}

    steps:
      - name: Check out deployed revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Mark production verification pending
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TARGET_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          PAYLOAD="$(node -e 'process.stdout.write(JSON.stringify({state:"pending",context:"digitalocean/runtime",description:"Exact live NovaLuis runtime verification is running",target_url:process.argv[1]}))' "$TARGET_URL")"
          curl --fail-with-body --silent --show-error \
            --request POST \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${EXPECTED_SHA}" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --header "Content-Type: application/json" \
            --data "$PAYLOAD"

      - name: Verify exact deployment and live contracts
        run: node scripts/verify-production-runtime.mjs

      - name: Mark production verification success
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TARGET_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          PAYLOAD="$(node -e 'process.stdout.write(JSON.stringify({state:"success",context:"digitalocean/runtime",description:"Exact live PWA, workers, skills, voice, social, and durable runtime passed",target_url:process.argv[1]}))' "$TARGET_URL")"
          curl --fail-with-body --silent --show-error \
            --request POST \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${EXPECTED_SHA}" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --header "Content-Type: application/json" \
            --data "$PAYLOAD"

      - name: Mark production verification failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TARGET_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          PAYLOAD="$(node -e 'process.stdout.write(JSON.stringify({state:"failure",context:"digitalocean/runtime",description:"Live revision or NovaLuis runtime contract failed",target_url:process.argv[1]}))' "$TARGET_URL")"
          curl --fail-with-body --silent --show-error \
            --request POST \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${EXPECTED_SHA}" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --header "Content-Type: application/json" \
            --data "$PAYLOAD"
