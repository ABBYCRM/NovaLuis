name: Commit Agentic Demo Repair

on:
  push:
    branches:
      - agent/embed-openclaw-backend

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/embed-openclaw-backend
          fetch-depth: 1

      - name: Extract the fenced Python program
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('scripts/agentic_demo.py')
          text = path.read_text()
          if text.startswith('#!/usr/bin/env python3\n'):
              print('agentic_demo.py is already extracted')
              raise SystemExit(0)

          start_marker = '````python\n'
          end_marker = '\n````\n'
          if text.count(start_marker) != 1:
              raise SystemExit(f'expected one opening Python fence, found {text.count(start_marker)}')
          if text.count(end_marker) != 1:
              raise SystemExit(f'expected one closing Python fence, found {text.count(end_marker)}')

          before, remainder = text.split(start_marker, 1)
          code, after = remainder.split(end_marker, 1)
          if not before.startswith('Replace the simulated version with this complete'):
              raise SystemExit('unexpected wrapper preamble; refusing destructive edit')
          if not after.lstrip().startswith('Run it with:'):
              raise SystemExit('unexpected wrapper epilogue; refusing destructive edit')
          if not code.startswith('#!/usr/bin/env python3\n'):
              raise SystemExit('extracted body does not begin with the expected Python shebang')

          path.write_text(code.rstrip() + '\n')
          PY
          python -m py_compile scripts/agentic_demo.py
          git diff --check
          changed="$(git diff --name-only)"
          if [ -n "$changed" ]; then
            test "$changed" = 'scripts/agentic_demo.py'
          fi

      - name: Commit verified repair
        run: |
          if git diff --quiet -- scripts/agentic_demo.py; then
            echo 'No repair commit needed.'
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/agentic_demo.py
          git diff --cached --check
          git commit -m "fix: extract runnable agentic demo Python"
          git push origin HEAD:agent/embed-openclaw-backend
