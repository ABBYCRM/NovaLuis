name: Deploy DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: nova-luis-digitalocean-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      DO_APP_ID: a1046ca0-ab98-4775-8ed7-24f156432aaf
      LIVE_URL: https://nova-luis-8hjvt.ondigitalocean.app
      DIGITALOCEAN_API_TOKEN: ${{ secrets.DIGITALOCEAN_API_TOKEN }}
      DIGITALOCEAN_API_TOKEN_PAID: ${{ secrets.DIGITALOCEAN_API_TOKEN_PAID }}
      NOVA_OPERATOR_PIN: ${{ secrets.NOVA_OPERATOR_PIN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Mark deployment pending
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TARGET_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          PAYLOAD="$(node -e 'process.stdout.write(JSON.stringify({state:"pending",context:"digitalocean/deploy",description:"DigitalOcean deployment is running",target_url:process.argv[1]}))' "$TARGET_URL")"
          curl --fail-with-body --silent --show-error \
            --request POST \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --header "Content-Type: application/json" \
            --data "$PAYLOAD"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --shamefully-hoist

      - name: Typecheck API server
        run: pnpm run typecheck

      - name: Build API server
        run: pnpm --filter @workspace/api-server build

      - name: Check deployment credential
        shell: bash
        run: |
          set -euo pipefail
          TOKEN="${DIGITALOCEAN_API_TOKEN:-${DIGITALOCEAN_API_TOKEN_PAID:-}}"
          if [ -z "$TOKEN" ]; then
            echo "Neither DIGITALOCEAN_API_TOKEN nor DIGITALOCEAN_API_TOKEN_PAID is configured as a GitHub Actions secret." >&2
            exit 1
          fi

      - name: Ensure encrypted DigitalOcean operator PIN
        shell: bash
        run: |
          set -euo pipefail
          PIN="${NOVA_OPERATOR_PIN:-22}"
          echo "::add-mask::$PIN"
          NOVA_OPERATOR_PIN="$PIN" node scripts/ensure-digitalocean-operator-pin.mjs

      - name: Trigger DigitalOcean deployment
        id: trigger
        shell: bash
        run: |
          set -euo pipefail
          TOKEN="${DIGITALOCEAN_API_TOKEN:-${DIGITALOCEAN_API_TOKEN_PAID:-}}"
          RESPONSE="$(curl --fail-with-body --silent --show-error \
            --request POST \
            "https://api.digitalocean.com/v2/apps/${DO_APP_ID}/deployments" \
            --header "Authorization: Bearer ${TOKEN}" \
            --header "Content-Type: application/json" \
            --data '{"force_build":true}')"
          DEPLOYMENT_ID="$(node -e 'const d=JSON.parse(process.argv[1]); const id=d.deployment?.id||d.id; if(!id) process.exit(2); process.stdout.write(id)' "$RESPONSE")"
          echo "deployment_id=$DEPLOYMENT_ID" >> "$GITHUB_OUTPUT"
          echo "Triggered deployment $DEPLOYMENT_ID for commit $GITHUB_SHA"

      - name: Wait for deployment completion
        env:
          DEPLOYMENT_ID: ${{ steps.trigger.outputs.deployment_id }}
        shell: bash
        run: |
          set -euo pipefail
          TOKEN="${DIGITALOCEAN_API_TOKEN:-${DIGITALOCEAN_API_TOKEN_PAID:-}}"
          for attempt in $(seq 1 100); do
            RESPONSE="$(curl --fail-with-body --silent --show-error \
              "https://api.digitalocean.com/v2/apps/${DO_APP_ID}/deployments/${DEPLOYMENT_ID}" \
              --header "Authorization: Bearer ${TOKEN}")"
            PHASE="$(node -e 'const d=JSON.parse(process.argv[1]); process.stdout.write(String(d.deployment?.phase||d.phase||"UNKNOWN"))' "$RESPONSE")"
            echo "Deployment phase: $PHASE"
            case "$PHASE" in
              ACTIVE) exit 0 ;;
              ERROR|CANCELED|SUPERSEDED)
                echo "$RESPONSE" >&2
                exit 1
                ;;
            esac
            sleep 15
          done
          echo "DigitalOcean deployment did not become ACTIVE before timeout." >&2
          exit 1

      - name: Verify production endpoints
        shell: bash
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error \
            --retry 12 --retry-all-errors --retry-delay 10 \
            "${LIVE_URL}/api/healthz"
          echo
          curl --fail-with-body --silent --show-error \
            --retry 12 --retry-all-errors --retry-delay 10 \
            "${LIVE_URL}/api/openclaw/status"
          echo
          PROBE_URL="${LIVE_URL}/api/social/assets/instagram-instagram-post-0000000000000-00000000-0000-0000-0000-000000000000.png"
          STATUS="$(curl --silent --show-error \
            --retry 12 --retry-all-errors --retry-delay 10 \
            "$PROBE_URL" || true)"
          if [[ "$STATUS" != *"asset not found"* ]]; then
            echo "The hardened Instagram asset route is not active on the deployed service." >&2
            echo "Probe response: $STATUS" >&2
            exit 1
          fi

      - name: Record deployed commit
        run: |
          echo "DigitalOcean deployment verified for GitHub commit ${GITHUB_SHA}" >> "$GITHUB_STEP_SUMMARY"
          echo "Deployment ID: ${{ steps.trigger.outputs.deployment_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Live URL: ${LIVE_URL}" >> "$GITHUB_STEP_SUMMARY"

      - name: Mark deployment success
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TARGET_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          PAYLOAD="$(node -e 'process.stdout.write(JSON.stringify({state:"success",context:"digitalocean/deploy",description:"DigitalOcean deployment and live probes passed",target_url:process.argv[1]}))' "$TARGET_URL")"
          curl --fail-with-body --silent --show-error \
            --request POST \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --header "Content-Type: application/json" \
            --data "$PAYLOAD"

      - name: Mark deployment failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TARGET_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          PAYLOAD="$(node -e 'process.stdout.write(JSON.stringify({state:"failure",context:"digitalocean/deploy",description:"DigitalOcean deployment or live probe failed",target_url:process.argv[1]}))' "$TARGET_URL")"
          curl --fail-with-body --silent --show-error \
            --request POST \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --header "Content-Type: application/json" \
            --data "$PAYLOAD"
