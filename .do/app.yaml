##############################################################################
# DigitalOcean App Platform — NovaLuis
# https://docs.digitalocean.com/products/app-platform/reference/app-spec/
#
# Secret values are NEVER stored here. Set them in the DO dashboard or via
# the API. This file is the structural reference only.
##############################################################################

name: nova-luis
region: nyc

services:
  - name: nova
    github:
      repo: ABBYCRM/NovaLuis
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-2gb

    health_check:
      http_path: /api/healthz
      initial_delay_seconds: 30
      period_seconds: 30
      timeout_seconds: 10
      failure_threshold: 3

    envs:
      # ── Non-secret config ─────────────────────────────────────────────────
      - key: NODE_ENV
        value: "production"
      - key: PORT
        value: "8080"
      - key: NOVA_MODEL_PREFERENCE
        value: "nvidia"
      - key: OPENCLAW_AGENT_MODEL
        value: "poolside/laguna-xs-2.1"
      - key: NOVA_OPENCLAW_MODEL_ID
        value: "poolside/laguna-xs-2.1"
      - key: WORK_TREE_MODEL
        value: "poolside/laguna-xs-2.1"
      - key: LOG_LEVEL
        value: "info"
      - key: PUBLIC_BASE_URL
        value: "https://nova-luis-8hjvt.ondigitalocean.app"
      - key: NOVA_AGENT_CHAT_GATEWAY_URL
        value: ""

      # ── Custom agent (artifacts/agent/server.mjs) ─────────────────────────
      # Phase 1 remains AGENT_BACKEND=openclaw. The custom backend can still be
      # enabled independently without changing the canonical model selection.
      - key: CUSTOM_AGENT_ENABLED
        value: "0"
      - key: CUSTOM_AGENT_HOST
        value: "127.0.0.1"
      - key: CUSTOM_AGENT_PORT
        value: "18790"
      - key: AGENT_BACKEND
        value: "openclaw"
      - key: CUSTOM_AGENT_UPSTREAM_BASE
        value: "https://api.moonshot.ai/v1"
      - key: CUSTOM_AGENT_MODEL
        value: "kimi-k2.6"
      - key: CUSTOM_AGENT_TOOL_TIMEOUT_MS
        value: "60000"
      - key: CUSTOM_AGENT_MAX_ITER
        value: "8"

      # ── NVIDIA NIM credential + custom-agent provider ─────────────────────
      # The Laguna bootstrap reuses this encrypted key as NVIDIA_API_KEY inside
      # the process when the canonical variable is absent. The value is never
      # logged, persisted to source, or returned to the browser.
      - key: CUSTOM_AGENT_NVIDIA_NIM_KEY
        type: SECRET
      - key: CUSTOM_AGENT_NVIDIA_NIM_BASE
        value: "https://integrate.api.nvidia.com/v1"
      - key: CUSTOM_AGENT_NVIDIA_NIM_DEFAULT_MODEL
        value: "poolside/laguna-xs-2.1"

      # ── Secrets (values set via API / dashboard, never committed) ─────────
      - key: OPENAI_API_KEY
        type: SECRET
      - key: COMPOSIO_API_KEY
        type: SECRET
      - key: COMPOSIO_ORG_API_KEY
        type: SECRET
      - key: GEMINI_API_KEY
        type: SECRET
      - key: EXA_API_KEY
        type: SECRET
      - key: FIRECRAWL_API_KEY
        type: SECRET
      - key: TAVILY_API_KEY
        type: SECRET
      - key: STEEL_API_KEY
        type: SECRET
      - key: SCRAPFLY_API_KEY
        type: SECRET
      - key: SCRAPINGBEE_API_KEY
        type: SECRET
      - key: RESEND_API_KEY
        type: SECRET
      - key: HELICONE_API_KEY
        type: SECRET
      - key: PINECONE_API_KEY
        type: SECRET
      - key: SESSION_SECRET
        type: SECRET
      - key: SCREENSHOTONE_ACCESS_KEY
        type: SECRET
      - key: SCREENSHOTONE_SECRET_KEY
        type: SECRET
      - key: GITHUB_PERSONAL_ACCESS_TOKEN
        type: SECRET
      - key: E2B_API_KEY
        type: SECRET
      - key: SCRATCHPAD_DATABASE_URL
        type: SECRET
      - key: DATABASE_URL
        type: SECRET
