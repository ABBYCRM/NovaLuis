---

name: "Nova generated asset manifest"
description: >-
Register and verify generated Nova assets without malformed file URIs,
phantom outputs, unsafe paths, duplicate identifiers, or unverified files.
--------------------------------------------------------------------------

# Nova Generated Asset Manifest

## Correct Manifest

```toml
manifest_version = 1

uploads = []
outputs = []

[[generated]]
id = "BF8kZhYdJw7S4JpgggGAT"
type = "image"
title = "nova-bg"
source_path = "artifacts/nova/public/assets/nova-bg.png"
public_path = "/assets/nova-bg.png"
mime_type = "image/png"
status = "pending_verification"
```

Do not use:

```toml
uri = "file://artifacts/nova/public/assets/nova-bg.png"
```

A repository-relative path is not a valid absolute `file://` URI.

Use separate fields:

```text
source_path
→ repository-relative filesystem location

public_path
→ browser-visible asset URL
```

---

# Required Fields

Each generated artifact must contain:

```text
id
type
title
source_path
mime_type
status
```

Public assets must also contain:

```text
public_path
```

Verified assets must contain:

```text
size_bytes
sha256
```

Optional image metadata:

```text
width
height
```

---

# Status Values

Allowed states:

```text
pending_verification
verified
failed
missing
rejected
```

State transitions:

```text
manifest entry created
→ pending_verification

file exists and passes all checks
→ verified

generation failed
→ failed

manifest references absent file
→ missing

unsafe or invalid file
→ rejected
```

Only `verified` assets may be included in `outputs`.

---

# Upload and Output Semantics

```text
uploads
→ user-provided source artifacts

generated
→ files created during execution

outputs
→ verified generated artifacts delivered as final results
```

For an internal Nova UI background:

```toml
outputs = []
```

For a final user-facing deliverable:

```toml
outputs = ["BF8kZhYdJw7S4JpgggGAT"]
```

The ID may be added to `outputs` only after verification.

---

# Path Rules

Approved Nova public asset root:

```text
artifacts/nova/public/assets/
```

Allowed:

```text
artifacts/nova/public/assets/nova-bg.png
```

Reject:

```text
../nova-bg.png
/etc/passwd
artifacts/nova/public/assets/../../.env
artifacts/nova/public/assets/symlink-outside
```

Required invariant:

```text
resolved real path
must remain inside
artifacts/nova/public/assets/
```

---

# Public URL Mapping

A file stored at:

```text
artifacts/nova/public/assets/nova-bg.png
```

is normally served as:

```text
/assets/nova-bg.png
```

Required mapping:

```text
artifacts/nova/public/
→ /
```

Do not expose the repository path as the browser URL.

---

# Verification Requirements

The asset becomes `verified` only when:

```text
file exists
AND
file is a regular file
AND
resolved path remains inside the approved root
AND
no symlink escape exists
AND
file signature matches image/png
AND
size is within the configured limit
AND
image dimensions decode successfully
AND
SHA-256 is calculated
AND
public path resolves to the expected asset
```

A manifest record alone does not prove that the file exists.

---

# PNG Signature

A valid PNG begins with:

```text
89 50 4E 47 0D 0A 1A 0A
```

Do not trust only:

```text
.png extension
mime_type field
generator response
```

---

# Verified Manifest Shape

After real inspection, update with observed values:

```toml
manifest_version = 1

uploads = []
outputs = []

[[generated]]
id = "BF8kZhYdJw7S4JpgggGAT"
type = "image"
title = "nova-bg"
source_path = "artifacts/nova/public/assets/nova-bg.png"
public_path = "/assets/nova-bg.png"
mime_type = "image/png"
status = "verified"
size_bytes = 123456
sha256 = "replace-with-observed-lowercase-sha256"
width = 1920
height = 1080
```

Never invent:

```text
size_bytes
sha256
width
height
```

