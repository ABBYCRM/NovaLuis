# TypeScript Validator

```ts
import crypto from "node:crypto";
import fs from "node:fs";
import fsPromises from "node:fs/promises";
import path from "node:path";

const PUBLIC_ROOT = path.resolve(
  "artifacts/nova/public/assets",
);

const PNG_SIGNATURE = Buffer.from([
  0x89,
  0x50,
  0x4e,
  0x47,
  0x0d,
  0x0a,
  0x1a,
  0x0a,
]);

const GENERATED_ID_PATTERN =
  /^[A-Za-z0-9_-]{12,128}$/;

export type GeneratedAssetStatus =
  | "pending_verification"
  | "verified"
  | "failed"
  | "missing"
  | "rejected";

export interface GeneratedAsset {
  id: string;
  type: "image";
  title: string;
  source_path: string;
  public_path?: string;
  mime_type: "image/png";
  status: GeneratedAssetStatus;
  size_bytes?: number;
  sha256?: string;
  width?: number;
  height?: number;
}

export interface GeneratedManifest {
  manifest_version: 1;
  uploads: string[];
  outputs: string[];
  generated: GeneratedAsset[];
}

function assertSafeId(id: string): void {
  if (!GENERATED_ID_PATTERN.test(id)) {
    throw new Error(
      `GENERATED_ASSET_ID_INVALID:${id}`,
    );
  }
}

async function resolveSafePath(
  sourcePath: string,
): Promise<string> {
  if (
    !sourcePath ||
    path.isAbsolute(sourcePath) ||
    sourcePath.includes("\0")
  ) {
    throw new Error(
      "GENERATED_ASSET_PATH_INVALID",
    );
  }

  const resolved = path.resolve(sourcePath);
  const relative = path.relative(
    PUBLIC_ROOT,
    resolved,
  );

  if (
    relative === ".." ||
    relative.startsWith(`..${path.sep}`) ||
    path.isAbsolute(relative)
  ) {
    throw new Error(
      "GENERATED_ASSET_PATH_OUTSIDE_ROOT",
    );
  }

  const realPath =
    await fsPromises.realpath(resolved);

  const realRelative = path.relative(
    PUBLIC_ROOT,
    realPath,
  );

  if (
    realRelative === ".." ||
    realRelative.startsWith(
      `..${path.sep}`,
    ) ||
    path.isAbsolute(realRelative)
  ) {
    throw new Error(
      "GENERATED_ASSET_SYMLINK_ESCAPE",
    );
  }

  return realPath;
}

async function assertPng(
  filePath: string,
): Promise<void> {
  const file = await fsPromises.open(
    filePath,
    "r",
  );

  try {
    const signature = Buffer.alloc(8);

    const result = await file.read(
      signature,
      0,
      signature.length,
      0,
    );

    if (
      result.bytesRead !== 8 ||
      !signature.equals(PNG_SIGNATURE)
    ) {
      throw new Error(
        "GENERATED_ASSET_INVALID_PNG",
      );
    }
  } finally {
    await file.close();
  }
}

async function calculateSha256(
  filePath: string,
): Promise<string> {
  const hash = crypto.createHash("sha256");

  await new Promise<void>(
    (resolve, reject) => {
      const stream =
        fs.createReadStream(filePath);

      stream.on("data", (chunk) => {
        hash.update(chunk);
      });

      stream.once("error", reject);
      stream.once("end", resolve);
    },
  );

  return hash.digest("hex");
}

export async function verifyGeneratedAsset(
  asset: GeneratedAsset,
): Promise<GeneratedAsset> {
  assertSafeId(asset.id);

  if (asset.mime_type !== "image/png") {
    throw new Error(
      "GENERATED_ASSET_MIME_NOT_ALLOWED",
    );
  }

  const realPath = await resolveSafePath(
    asset.source_path,
  );

  const stat = await fsPromises.stat(realPath);

  if (!stat.isFile()) {
    throw new Error(
      "GENERATED_ASSET_NOT_REGULAR_FILE",
    );
  }

  const maximumBytes =
    25 * 1024 * 1024;

  if (stat.size > maximumBytes) {
    throw new Error(
      "GENERATED_ASSET_SIZE_LIMIT_EXCEEDED",
    );
  }

  await assertPng(realPath);

  return {
    ...asset,
    status: "verified",
    size_bytes: stat.size,
    sha256:
      await calculateSha256(realPath),
  };
}
```

