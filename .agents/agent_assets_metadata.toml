# Required Tests

```text
valid repository-relative PNG
→ verified

file:// repository-relative URI
→ rejected

missing file
→ status missing

absolute path
→ rejected

parent traversal
→ rejected

symlink escape
→ rejected

invalid PNG signature
→ rejected

oversized image
→ rejected

duplicate generated ID
→ rejected

unknown output ID
→ rejected

pending asset included in outputs
→ rejected

verified asset missing SHA-256
→ rejected

verified asset missing size
→ rejected

internal UI asset omitted from outputs
→ accepted
```

---

# Completion Gate

```text
GENERATED ASSET VERIFIED
=
safe path
+ real file
+ correct file signature
+ bounded size
+ observed SHA-256
+ correct public mapping
```

```text
FINAL OUTPUT VERIFIED
=
generated asset verified
+ generated ID included in outputs
```

---

# Prohibited Behavior

```text
Do not use file:// for repository-relative paths.

Do not claim an asset exists because a generator returned an ID.

Do not add pending assets to outputs.

Do not invent hashes, sizes, or dimensions.

Do not trust filename extensions as MIME verification.

Do not allow absolute paths or parent traversal.

Do not follow symlinks outside the approved root.

Do not expose repository paths as public URLs.

Do not report generation success without inspecting the file.
```

---

# Final Invariant

```text
REPOSITORY LOCATION
→ source_path

BROWSER LOCATION
→ public_path

GENERATED RECORD
≠
VERIFIED FILE

OUTPUT
=
VERIFIED GENERATED ASSET ONLY
```

**END OF SPEC**
