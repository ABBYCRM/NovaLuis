# Manifest Integrity Validation

```ts
export function validateManifest(
  manifest: GeneratedManifest,
): void {
  if (manifest.manifest_version !== 1) {
    throw new Error(
      "GENERATED_MANIFEST_VERSION_UNSUPPORTED",
    );
  }

  const assetsById = new Map<
    string,
    GeneratedAsset
  >();

  for (const asset of manifest.generated) {
    assertSafeId(asset.id);

    if (assetsById.has(asset.id)) {
      throw new Error(
        `GENERATED_ASSET_ID_DUPLICATE:${asset.id}`,
      );
    }

    if (
      asset.status === "verified" &&
      (
        !asset.sha256 ||
        !Number.isSafeInteger(
          asset.size_bytes,
        )
      )
    ) {
      throw new Error(
        `VERIFIED_ASSET_MISSING_EVIDENCE:${asset.id}`,
      );
    }

    assetsById.set(asset.id, asset);
  }

  for (const outputId of manifest.outputs) {
    const output =
      assetsById.get(outputId);

    if (!output) {
      throw new Error(
        `OUTPUT_REFERENCES_UNKNOWN_ASSET:${outputId}`,
      );
    }

    if (output.status !== "verified") {
      throw new Error(
        `OUTPUT_ASSET_NOT_VERIFIED:${outputId}`,
      );
    }
  }
}
```

