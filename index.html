<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ABBYCRM / Superpowers — Skills Catalog</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; }
    header { background: #161b22; border-bottom: 1px solid #30363d; padding: 24px 40px; }
    header h1 { font-size: 28px; font-weight: 700; color: #58a6ff; }
    header p { color: #8b949e; margin-top: 6px; font-size: 15px; }
    .badge { display: inline-block; background: #238636; color: #fff; border-radius: 12px; padding: 2px 10px; font-size: 12px; font-weight: 600; margin-top: 8px; }
    main { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }
    .stats { display: flex; gap: 24px; margin-bottom: 40px; }
    .stat { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 20px 28px; }
    .stat .num { font-size: 36px; font-weight: 700; color: #58a6ff; }
    .stat .label { color: #8b949e; font-size: 13px; margin-top: 4px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 20px 24px; transition: border-color 0.15s; cursor: pointer; }
    .card:hover { border-color: #58a6ff; }
    .card h3 { font-size: 16px; font-weight: 600; color: #e6edf3; margin-bottom: 8px; }
    .card p { font-size: 13px; color: #8b949e; line-height: 1.5; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    .tag { background: #21262d; border: 1px solid #30363d; border-radius: 6px; padding: 2px 8px; font-size: 11px; color: #8b949e; }
    .loading { color: #8b949e; text-align: center; padding: 60px; font-size: 16px; }
    .detail-panel { display: none; background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 28px; margin-top: 32px; white-space: pre-wrap; font-size: 14px; line-height: 1.7; color: #e6edf3; overflow-x: auto; }
    .detail-panel.active { display: block; }
    #skill-detail { display: none; }
  </style>
</head>
<body>
  <header>
    <h1>ABBYCRM / Superpowers</h1>
    <p>Agentic-skills framework for coding agents — extended bundle</p>
    <span class="badge" id="skill-count">Loading…</span>
  </header>
  <main>
    <div class="stats">
      <div class="stat"><div class="num" id="total-skills">—</div><div class="label">Total Skills</div></div>
      <div class="stat"><div class="num">v6.1.1</div><div class="label">Version</div></div>
      <div class="stat"><div class="num">Claude Code</div><div class="label">Platform</div></div>
    </div>
    <div class="grid" id="skills-grid">
      <div class="loading">Loading skills…</div>
    </div>
    <div id="skill-detail" class="detail-panel">
      <h2 id="detail-title" style="margin-bottom:16px; color:#58a6ff;"></h2>
      <div id="detail-content"></div>
    </div>
  </main>
  <script>
    async function loadSkills() {
      const res = await fetch('/api/skills');
      const data = await res.json();
      document.getElementById('skill-count').textContent = `${data.count} Skills`;
      document.getElementById('total-skills').textContent = data.count;
      const grid = document.getElementById('skills-grid');
      grid.innerHTML = '';
      data.skills.forEach(skill => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<h3>${skill.name}</h3><p>${skill.description || 'No description'}</p>
          <div class="tags">${(skill.tags||[]).map(t => `<span class="tag">${t}</span>`).join('')}</div>`;
        card.onclick = () => loadDetail(skill.name, card);
        grid.appendChild(card);
      });
    }
    async function loadDetail(name, card) {
      const res = await fetch(`/api/skills/${name}`);
      const data = await res.json();
      document.getElementById('detail-title').textContent = data.name;
      document.getElementById('detail-content').textContent = data.content;
      document.getElementById('skill-detail').style.display = 'block';
      document.getElementById('skill-detail').scrollIntoView({ behavior: 'smooth' });
      document.querySelectorAll('.card').forEach(c => c.style.borderColor = '');
      card.style.borderColor = '#58a6ff';
    }
    loadSkills();
  </script>
</body>
</html>
